version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-media_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-media_pass}
      POSTGRES_DB: ${POSTGRES_DB:-media_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media_user} -d ${POSTGRES_DB:-media_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      API_URL: ${API_URL:-http://localhost:3000}
      COMFY_URL: ${COMFY_URL:-http://localhost:8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-media_user}:${POSTGRES_PASSWORD:-media_pass}@db:5432/${POSTGRES_DB:-media_db}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  pg_data:
  uploads_data:
