version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: media_user
      POSTGRES_PASSWORD: media_pass
      POSTGRES_DB: media_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_user -d media_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://media_user:media_pass@db:5432/media_db
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  pg_data:
  uploads_data:
